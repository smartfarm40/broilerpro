<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #3B82F6;
      margin-bottom: 20px;
    }
    .upload-area {
      border: 2px dashed #3B82F6;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      background: #f0f7ff;
    }
    .upload-area.dragover {
      background: #e0f0ff;
      border-color: #2563eb;
    }
    #preview {
      max-width: 200px;
      margin: 20px auto;
      display: none;
    }
    #preview img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .btn {
      background: #3B82F6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }
    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .icon-item {
      text-align: center;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .icon-item img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .icon-item span {
      font-size: 12px;
      color: #6b7280;
    }
    .download-btn {
      background: #10b981;
      margin-top: 8px;
      padding: 6px 12px;
      font-size: 12px;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Generate PWA Icons</h1>
    <p>Upload <strong>broiler-pro.PNG</strong> untuk generate berbagai ukuran icon PWA</p>
    
    <div class="upload-area" id="uploadArea">
      <p>📁 Klik atau drag & drop gambar di sini</p>
      <p style="font-size: 12px; color: #6b7280; margin-top: 8px;">
        Rekomendasi: Gambar persegi minimal 512x512px
      </p>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div id="preview">
      <img id="previewImg" src="" alt="Preview">
    </div>

    <button class="btn" id="generateBtn" disabled>Generate Icons</button>

    <div class="status" id="status"></div>

    <div id="iconsContainer" style="display: none;">
      <h3 style="margin-top: 30px;">Generated Icons:</h3>
      <div class="icons-grid" id="iconsGrid"></div>
      <button class="btn" id="downloadAllBtn" style="margin-top: 20px;">Download All as ZIP</button>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const generateBtn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const iconsContainer = document.getElementById('iconsContainer');
    const iconsGrid = document.getElementById('iconsGrid');

    let sourceImage = null;

    // Upload area click
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag & drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      }
    });

    // File input change
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          sourceImage = img;
          previewImg.src = e.target.result;
          preview.style.display = 'block';
          generateBtn.disabled = false;
          showStatus('✓ Gambar berhasil diupload. Klik "Generate Icons" untuk melanjutkan.', 'success');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // Generate icons
    generateBtn.addEventListener('click', generateIcons);

    function generateIcons() {
      if (!sourceImage) return;

      const sizes = [
        { size: 72, name: 'icon-72.png' },
        { size: 96, name: 'icon-96.png' },
        { size: 128, name: 'icon-128.png' },
        { size: 144, name: 'icon-144.png' },
        { size: 152, name: 'icon-152.png' },
        { size: 192, name: 'icon-192.png' },
        { size: 384, name: 'icon-384.png' },
        { size: 512, name: 'icon-512.png' }
      ];

      iconsGrid.innerHTML = '';
      const generatedIcons = [];

      sizes.forEach(({ size, name }) => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Draw with white background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);

        // Draw image centered
        ctx.drawImage(sourceImage, 0, 0, size, size);

        // Convert to blob
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          generatedIcons.push({ name, url, blob, size });

          // Add to grid
          const iconItem = document.createElement('div');
          iconItem.className = 'icon-item';
          iconItem.innerHTML = `
            <img src="${url}" alt="${name}">
            <span>${size}x${size}</span>
            <button class="btn download-btn" onclick="downloadIcon('${url}', '${name}')">Download</button>
          `;
          iconsGrid.appendChild(iconItem);
        }, 'image/png');
      });

      iconsContainer.style.display = 'block';
      showStatus('✓ Icons berhasil di-generate! Scroll ke bawah untuk download.', 'success');
    }

    function downloadIcon(url, name) {
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.click();
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
    }

    // Download all as ZIP (requires JSZip library)
    document.getElementById('downloadAllBtn').addEventListener('click', () => {
      alert('Untuk download semua sekaligus, download satu per satu atau gunakan tool seperti JSZip.\n\nAtau simpan manual ke folder icons/');
    });
  </script>
</body>
</html>
