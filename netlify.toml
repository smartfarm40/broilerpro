[build]
  # No build command needed for static site
  publish = "."

# Paksa HTTPS — redirect semua HTTP ke HTTPS
[[redirects]]
  from = "http://barotechbro.netlify.app/*"
  to   = "https://barotechbro.netlify.app/:splat"
  status = 301
  force  = true

# SPA redirect untuk client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Paksa HTTPS selama 1 tahun (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache aset statis
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker tidak boleh di-cache (harus selalu fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
